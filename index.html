<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮券整合管理系統</title>
    <style>
    :root {
        --primary-pink: #ffb7c5;
        --dark-pink: #ff85a2;
        --soft-bg: #fff5f7;
        --text-color: #5a3e44;
        --border-color: #ffcdd2;
        --primary-blue: #0071e3;
        --success-green: #28a745;
        --warning-orange: #ff9500;
        --danger-red: #ff3b30;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
    body { background-color: var(--soft-bg); padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text-color); }
    .container { width: 100%; max-width: 1200px; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(255,183,197,0.3); }
    .page { display: none; }
    .page.active { display: block; }
    .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    h2 { margin-bottom: 20px; color: var(--text-color); display: flex; justify-content: space-between; align-items: center; }
    h3 { margin: 15px 0; color: #1d1d1f; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--primary-pink); border-radius: 8px; font-size: 14px; display: block; background: #fff; }
    textarea { height: 100px; resize: vertical; }
    button { padding: 8px 16px; background: var(--dark-pink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:disabled { background: #e0e0e0; cursor: not-allowed; }
    .nav-btn { padding: 10px 15px; background: #fff0f3; color: var(--text-color); border: 1px solid var(--primary-pink); border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 5px; }
    .nav-btn.active { background: var(--dark-pink); color: white; border-color: var(--dark-pink); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
    th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; font-size: 12px; word-wrap: break-word; vertical-align: middle; }
    th { background: #fff0f3; }
    td input { width: 100%; padding: 4px; border: none; background: transparent; text-align: center; }
    td input:disabled { color: #555; background: #eee; cursor: not-allowed; }
    .act-row-btn { background: var(--dark-pink); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .edit-btn { background: var(--warning-orange); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .save-btn { background: var(--success-green); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .del-btn { background: var(--danger-red); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; color: var(--dark-pink); font-weight: bold; }
    #toast { position: fixed; top: 20px; right: 20px; background: var(--dark-pink); color: white; padding: 15px; border-radius: 8px; display: none; z-index: 10000; }
    #previewBox { background: #f0f7ff; padding: 15px; border-radius: 10px; display: none; margin-top: 15px; border: 1px solid #cce5ff; }
    </style>
</head>
<body>

<div id="loadingOverlay">處理中...</div>
<div id="toast">存檔成功！</div>

<div class="container">
    <!-- 登入頁面 -->
    <div id="loginPage" class="page active">
        <h2>禮券整合管理系統</h2>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
        <div class="form-group"><label>密碼</label><input type="password" id="loginCode"></div>
        <button onclick="handleLogin()" style="width:100%;">登入系統</button>
    </div>

    <!-- 主應用頁面 -->
    <div id="appPage" class="page">
        <h2>禮券管理系統</h2>
        
        <!-- 主導覽 -->
        <nav style="margin-bottom:20px; display:flex; gap:10px; flex-wrap: wrap;">
            <button id="nav-regPage" class="nav-btn active" onclick="switchPage('regPage')">登記新券</button>
            <button id="nav-actPage" class="nav-btn" onclick="switchPage('actPage')">禮券啟用</button>
            <button id="nav-usePage" class="nav-btn" onclick="switchPage('usePage')">禮券使用 (快速登記)</button>
            <button id="nav-recordsPage" class="nav-btn" onclick="switchPage('recordsPage')">流水帳記錄管理</button>
        </nav>

        <!-- 登記新券 (系統1的登記功能) -->
        <div id="regPage" class="page active">
            <h2>登記新券 (Batch: <span id="batchDisplay">讀取中...</span>)</h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group">
                        <label>輸入模式</label>
                        <select id="regMode" onchange="toggleRegMode(this.value)">
                            <option value="list">清單輸入</option>
                            <option value="range" selected>範圍輸入</option>
                        </select>
                    </div>
                    <div id="regList" style="display:none;" class="form-group">
                        <label>Code 清單 (每行一筆)</label>
                        <textarea id="regCodes" oninput="calcTotal('regCodes', 'regTotal')"></textarea>
                    </div>
                    <div id="regRange">
                        <div class="form-group"><label>首碼 (起始)</label><input type="text" id="regStart" placeholder="掃描後自動跳格" oninput="calcTotalRange('reg')"></div>
                        <div class="form-group"><label>尾碼 (結束)</label><input type="text" id="regEnd" placeholder="掃描後自動跳格" oninput="calcTotalRange('reg')"></div>
                    </div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="supplierSelect" onchange="updateGiftMenu()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="giftSelect"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <h3 id="regTotal">總張數: 0</h3>
            <button id="regBtn" onclick="register(false)" style="width:100%; padding: 12px;">確認登記</button>
        </div>

        <!-- 禮券啟用 (系統1的啟用功能) -->
        <div id="actPage" class="page">
            <h2>禮券啟用管理 (已使用未啟用)</h2>
            <div class="form-group">
                <label>輸入模式</label>
                <select id="actMode" onchange="toggleActMode(this.value)">
                    <option value="list">清單輸入</option>
                    <option value="range" selected>範圍輸入</option>
                </select>
            </div>
            <div id="actList" style="display:none;" class="form-group">
                <label>Code 清單 (每行一筆)</label>
                <textarea id="actCodes" oninput="calcTotal('actCodes', 'actTotal')"></textarea>
            </div>
            <div id="actRange">
                <div class="form-group"><label>起始 (掃描後自動跳格)</label><input type="text" id="actStart" oninput="calcTotalRange('act')"></div>
                <div class="form-group"><label>結束 (掃描後自動跳格)</label><input type="text" id="actEnd" oninput="calcTotalRange('act')"></div>
            </div>
            <h3 id="actTotal">總張數: 0</h3>
            <button id="actBtn" onclick="activateGift()" style="width:100%; padding: 12px; background: #0071e3;">確認點擊啟用</button>
        </div>

        <!-- 禮券使用 (系統2的預覽介面 + 系統1的使用API) -->
        <div id="usePage" class="page">
            <h2>禮券使用 (快速登記)</h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group"><label>首碼</label><input type="text" id="useStart" oninput="useAutoDetect()" onkeypress="if(event.keyCode==13){document.getElementById('useEnd').focus();return false;}"></div>
                    <div class="form-group"><label>尾碼</label><input type="text" id="useEnd" oninput="usePreviewData()"></div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="useSupplierSelect" onchange="useUpdateGiftSelect()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="useGiftSelect" onchange="usePreviewData()"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <button onclick="usePreviewData()" style="width:100%; background:#6c757d; margin-bottom:15px;">計算並預覽</button>
            
            <div id="previewBox">
                <p><strong>預覽資訊</strong></p>
                <p>供應商: <span id="pSup"></span> | 項目: <span id="pGift"></span></p>
                <p>範圍: <span id="pStart"></span> ~ <span id="pEnd"></span></p>
                <p>有效日期: <span id="pExpiry"></span></p>
                <p>系統計算數量: <strong id="pCount" style="color:red; font-size:18px;"></strong></p>
                <div class="form-group" style="margin-top:15px;"><label>填寫訂單號 (必填)</label><input type="text" id="useOrderNo" required></div>
                <button id="finalUseBtn" onclick="useConfirmSubmit()" style="background:#28a745; width:100%; color:white; padding:10px; border:none; border-radius:5px;">確認使用 (正式存檔)</button>
            </div>
        </div>

        <!-- 流水帳記錄管理 (系統2的記錄管理介面) -->
        <div id="recordsPage" class="page">
            <h2>流水帳記錄管理 <button onclick="loadRecords()" style="font-size:12px;">重新整理</button></h2>
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px; display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
                <input type="text" id="filterUser" placeholder="篩選人員" oninput="loadRecords()">
                <input type="text" id="filterOrder" placeholder="篩選訂單號" oninput="loadRecords()">
                <input type="date" id="filterDate" onchange="loadRecords()">
                <input type="text" id="filterItem" placeholder="篩選項目" oninput="loadRecords()">
            </div>
            <button onclick="toggleSort()" style="margin-bottom:10px;">切換時間排序</button>
            <table id="recordsTable">
                <thead><tr><th style="width:12%">時間</th><th style="width:12%">供應商</th><th style="width:12%">項目</th><th style="width:12%">首碼</th><th style="width:12%">尾碼</th><th style="width:8%">數量</th><th style="width:8%">人員</th><th style="width:10%">訂單號</th><th style="width:6%">有效期</th><th style="width:10%">操作</th></tr></thead>
                <tbody id="recordsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // API URLs
    const API_URL_SYS1 = "https://script.google.com/macros/s/AKfycbz8jMVaJLH03E9ORniS8xEY_q_kJDq5mYbJ1H-XbKhclJphSfCn48IGBZDIybM9q-heVw/exec";
    const API_URL_SYS2 = 'https://script.google.com/macros/s/AKfycbxVE0NW6xl454u9OqhN51Prd6VQnuOuJLoMImgfPSfKVMpyuuHeeBZkxPxJL6V26Q/exec';
    
    let configData, currentBatch;
    let giftDatabase = [], currentUser = "", sortDesc = true;

    // 通用函數
    function showToast() { const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    // 登入
    async function handleLogin() {
        showLoading();
        const email = document.getElementById('loginEmail').value;
        const code = document.getElementById('loginCode').value;
        try {
            // 使用系統1的驗證
            const res = await fetch(`${API_URL_SYS1}?action=verify&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.success) {
                currentUser = data.name;
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('appPage').classList.add('active');
                
                // 載入系統1的配置
                var configRes = await (await fetch(API_URL_SYS1)).json();
                configData = configRes.config;
                await refreshBatchDisplay();
                
                // 載入系統2的配置 (用於使用介面的自動偵測)
                await loadSys2Config();
                
                // 初始化下拉選單
                initDropdowns();
                
                hideLoading();
            } else { alert('驗證失敗'); hideLoading(); }
        } catch (e) { alert('系統錯誤'); hideLoading(); }
    }

    async function refreshBatchDisplay() {
        const res = await fetch(API_URL_SYS1 + "?action=getBatch");
        const data = await res.json();
        currentBatch = data.batch;
        document.getElementById('batchDisplay').innerText = currentBatch;
    }

    async function loadSys2Config() {
        const res = await fetch(`${API_URL_SYS2}?action=getConfig`);
        giftDatabase = await res.json();
    }

    function initDropdowns() {
        // 系統1 登記選單
        document.getElementById('supplierSelect').innerHTML = '<option value="">請選擇</option>';
        [...new Set(configData.map(r => r[0]))].forEach(s => {
            var opt = document.createElement('option'); opt.value = s; opt.text = s;
            document.getElementById('supplierSelect').appendChild(opt);
        });

        // 系統2 使用選單
        const suppliers = [...new Set(giftDatabase.map(i => i.supplier))];
        document.getElementById('useSupplierSelect').innerHTML = '<option value="">請選擇</option>' + suppliers.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    // 頁面切換
    function switchPage(p) {
        document.querySelectorAll('#appPage .page').forEach(e => e.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'recordsPage') loadRecords();
    }

    // ========== 登記新券 (系統1) ==========
    function toggleRegMode(m) { 
        document.getElementById('regList').style.display = (m === 'list') ? 'block' : 'none'; 
        document.getElementById('regRange').style.display = (m === 'range') ? 'block' : 'none'; 
    }

    function updateGiftMenu() { 
        var s = document.getElementById('supplierSelect').value;
        var g = document.getElementById('giftSelect'); 
        g.innerHTML = '<option value="">請選擇</option>'; 
        configData.filter(r => r[0] === s).forEach(r => { 
            var opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); 
        }); 
    }

    async function register(confirmed) { 
        var btn = document.getElementById('regBtn'); 
        btn.innerText = "處理中..."; 
        btn.disabled = true; 
        showLoading();
        var s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value; 
        if(!s || !g) { alert("請選擇供應商與項目"); btn.innerText = "確認登記"; btn.disabled = false; hideLoading(); return; }
        var codes = (document.getElementById('regMode').value === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('regStart').value.trim(), document.getElementById('regEnd').value.trim()); 
        
        var res = await (await fetch(API_URL_SYS1, { 
            method: "POST", 
            body: JSON.stringify({
                mode: 'register', 
                confirm: confirmed,
                payload: codes.map(c => ({Batch: currentBatch, Supplier: s, GiftName: g, Code: c.toString()}))
            }) 
        })).json(); 
        
        btn.innerText = "確認登記";
        btn.disabled = false;
        hideLoading();
        
        if (res.result === "confirm") {
            if (confirm(res.message)) { register(true); }
        } else if (res.result === "success") {
            alert("登記完成！成功新增 " + res.count + " 筆。"); 
            showToast();
            document.getElementById('regStart').value = "";
            document.getElementById('regEnd').value = "";
            document.getElementById('regCodes').value = "";
            document.getElementById('regTotal').innerText = "總張數: 0";
            await refreshBatchDisplay();
        } else { alert("錯誤: " + res.message); }
    }

    // ========== 禮券啟用 (系統1) ==========
    function toggleActMode(m) { 
        document.getElementById('actList').style.display = (m === 'list') ? 'block' : 'none'; 
        document.getElementById('actRange').style.display = (m === 'range') ? 'block' : 'none'; 
    }

    async function activateGift() {
        var m = document.getElementById('actMode').value;
        var codes = (m === 'list') ? document.getElementById('actCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('actStart').value.trim(), document.getElementById('actEnd').value.trim());
        if(codes.length === 0 || !codes[0]) { alert("請輸入有效的代碼範圍或清單！"); return; }
        if (!confirm("您確定要啟用這批共 " + codes.length + " 筆禮券嗎？")) return;
        
        showLoading();
        var res = await (await fetch(API_URL_SYS1, {
            method: "POST",
            body: JSON.stringify({ mode: 'activate', payload: codes })
        })).json();

        if(res.result === "success") {
            alert("啟用成功！已將 " + res.count + " 筆禮券變更為已啟動狀態。");
            showToast();
        } else { alert("更新失敗：" + res.message); }
        hideLoading();
    }

    // ========== 禮券使用 (系統2介面 + 系統1 API) ==========
    function useUpdateGiftSelect() {
        const s = document.getElementById('useSupplierSelect').value;
        const filtered = giftDatabase.filter(i => i.supplier === s);
        document.getElementById('useGiftSelect').innerHTML = '<option value="">請選擇</option>' + filtered.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
        usePreviewData();
    }

    function useAutoDetect() {
        const s = document.getElementById('useStart').value.trim();
        if (!s) return;
        const match = giftDatabase.find(item => {
            if (!item.rule2 || item.rule2 === 'N/A') return false;
            const parts = item.rule2.split(':');
            if (parts[0] === 'POS') return s.substring(parseInt(parts[1]), parseInt(parts[1]) + parts[2].length) === parts[2];
            if (parts[0] === 'START') return s.startsWith(parts[1]);
            return false;
        });
        if (match) {
            document.getElementById('useSupplierSelect').value = match.supplier;
            useUpdateGiftSelect();
            document.getElementById('useGiftSelect').value = match.name;
            usePreviewData();
        }
    }

    function usePreviewData() {
        const match = giftDatabase.find(i => i.name === document.getElementById('useGiftSelect').value);
        if (match && document.getElementById('useStart').value && document.getElementById('useEnd').value) {
            document.getElementById('pSup').innerText = match.supplier;
            document.getElementById('pGift').innerText = match.name;
            document.getElementById('pStart').innerText = document.getElementById('useStart').value;
            document.getElementById('pEnd').innerText = document.getElementById('useEnd').value;
            document.getElementById('pExpiry').innerText = calculateExpiryDate(match.rule1);
            document.getElementById('pCount').innerText = calculateCount(document.getElementById('useStart').value, document.getElementById('useEnd').value, match.calcType);
            document.getElementById('previewBox').style.display = 'block';
            window.currentUseMatch = match;
        }
    }

    async function useConfirmSubmit() {
        if (!document.getElementById('useOrderNo').value) { alert('請填寫訂單號'); return; }
        showLoading();
        
        const codes = getRangeCodes(document.getElementById('useStart').value.trim(), document.getElementById('useEnd').value.trim());
        const match = window.currentUseMatch;
        
        // 呼叫系統1的使用API
        const res = await (await fetch(API_URL_SYS1, { 
            method: "POST", 
            body: JSON.stringify({
                mode: 'use', 
                confirm: true, // 直接確認
                Supplier: match.supplier, 
                GiftName: match.name, 
                payload: codes.map(c => ({Code: applySuffixLogic(c, match.calcType), OrderNo: document.getElementById('useOrderNo').value}))
            }) 
        })).json();

        // 同時將記錄寫入系統2的流水帳
        const payloadSys2 = { 
            action: 'insertRecord', 
            supplier: match.supplier, 
            gift: match.name, 
            start: document.getElementById('useStart').value, 
            end: document.getElementById('useEnd').value, 
            count: document.getElementById('pCount').innerText, 
            user: currentUser, 
            orderNo: document.getElementById('useOrderNo').value, 
            expiry: document.getElementById('pExpiry').innerText 
        };
        await fetch(API_URL_SYS2, { method: 'POST', body: JSON.stringify(payloadSys2) });
        
        hideLoading();
        if (res.result === "error") { alert(res.message); }
        else {
            alert("使用登記完成！");
            showToast();
            document.getElementById('useStart').value = '';
            document.getElementById('useEnd').value = '';
            document.getElementById('useOrderNo').value = '';
            document.getElementById('previewBox').style.display = 'none';
        }
    }

    // ========== 記錄管理 (系統2) ==========
    async function loadRecords() {
        showLoading();
        const res = await fetch(`${API_URL_SYS2}?action=getRecords`);
        let rawRecords = await res.json();
        let recordsWithObjects = rawRecords.map((r, index) => ({ data: r, oriIndex: index }));

        const fUser = document.getElementById('filterUser').value.toLowerCase();
        const fOrder = document.getElementById('filterOrder').value.toLowerCase();
        const fDate = document.getElementById('filterDate').value;
        const fItem = document.getElementById('filterItem').value.toLowerCase();

        recordsWithObjects = recordsWithObjects.filter(item => {
            const r = item.data;
            return r[6].toLowerCase().includes(fUser) &&
                   String(r[7]).toLowerCase().includes(fOrder) &&
                   r[2].toLowerCase().includes(fItem) &&
                   (!fDate || new Date(r[0]).toISOString().split('T')[0] === fDate);
        });

        recordsWithObjects.sort((a, b) => sortDesc ? new Date(b.data[0]) - new Date(a.data[0]) : new Date(a.data[0]) - new Date(b.data[0]));

        document.getElementById('recordsBody').innerHTML = recordsWithObjects.map((item) => {
            const r = item.data;
            const idx = item.oriIndex;
            const isDel = r[8] === "...已登記刪除" || r[8] === "已登記刪除";
            const expiryVal = r[9] || 'N/A';

            return `<tr>
                <td>${new Date(r[0]).toLocaleString()}</td>
                <td><input type="text" class="edit-in-${idx}" value="${r[1]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[2]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[3]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[4]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td>${r[5]}</td>
                <td>${r[6]}</td>
                <td><input type="text" class="edit-in-${idx}" value="${r[7]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td>${expiryVal}</td>
                <td>${!isDel ? `<button class="edit-btn" id="btn-edit-${idx}" onclick="toggleEdit(${idx})">Edit</button>
                               <button class="save-btn" id="btn-save-${idx}" onclick="saveRow(${idx})" style="display:none">Save</button>
                               <button class="del-btn" onclick="deleteRow(${idx})">刪除</button>` : '已登記刪除'}</td>
            </tr>`;
        }).join('');
        hideLoading();
    }

    function toggleEdit(i) {
        document.querySelectorAll(`.edit-in-${i}`).forEach(el => el.disabled = false);
        document.getElementById(`btn-edit-${i}`).style.display = 'none';
        document.getElementById(`btn-save-${i}`).style.display = 'inline-block';
    }

    async function saveRow(i) {
        const inputs = document.querySelectorAll(`.edit-in-${i}`);
        const currentGiftName = inputs[1].value;
        const match = giftDatabase.find(item => item.name === currentGiftName);
        const calcType = match ? match.calcType : 'normal';
        const c = calculateCount(inputs[2].value, inputs[3].value, calcType);
        
        showLoading();
        await fetch(API_URL_SYS2, { method: 'POST', body: JSON.stringify({ action: 'updateRecord', index: i, supplier: inputs[0].value, gift: inputs[1].value, start: inputs[2].value, end: inputs[3].value, count: c, orderNo: inputs[4].value }) });
        loadRecords();
        hideLoading();
    }

    async function deleteRow(i) {
        if (!confirm("確認刪除此筆記錄？")) return;
        showLoading();
        await fetch(API_URL_SYS2, { method: 'POST', body: JSON.stringify({ action: 'markDeleted', index: i }) });
        loadRecords();
        hideLoading();
    }

    function toggleSort() { sortDesc = !sortDesc; loadRecords(); }

    // 工具函數
    function calculateExpiryDate(rule) {
        if (!rule || rule === 'N/A') return 'N/A';
        if (rule.includes('m_end')) {
            const months = parseInt(rule);
            const date = new Date();
            date.setMonth(date.getMonth() + months + 1);
            date.setDate(0);
            return date.toISOString().split('T')[0];
        }
        return rule;
    }

    function calculateCount(start, end, type) {
        let a = start.replace(/[^0-9]/g, '');
        let b = end.replace(/[^0-9]/g, '');
        let valA, valB;
        if (type === 'suffix_1') { valA = parseInt(a.slice(0, -1), 10); valB = parseInt(b.slice(0, -1), 10); }
        else if (type === 'suffix_2') { valA = parseInt(a.slice(0, -2), 10); valB = parseInt(b.slice(0, -2), 10); }
        else if (type === 'suffix_12') { valA = parseInt(a.slice(-12), 10); valB = parseInt(b.slice(-12), 10); }
        else { valA = parseInt(a, 10); valB = parseInt(b, 10); }
        return Math.abs(valB - valA) + 1;
    }

    function applySuffixLogic(val, type) { 
        var s = val.toString().trim(); 
        var match = s.match(/^([A-Za-z]*)(.*)$/);
        var prefix = match[1] || "";
        var numPart = match[2] || "";
        if (type === "suffix_12") numPart = numPart.slice(-12);
        else if (type === "suffix_1") numPart = numPart.slice(0, -1);
        else if (type === "suffix_2") numPart = numPart.slice(0, -2);
        return prefix + numPart; 
    }

    function getRangeCodes(start, end) { 
        var sStr = start.toString().trim();
        var eStr = end.toString().trim();
        if(!sStr || !eStr) return [];
        var sMatch = sStr.match(/^([A-Za-z]*)(.*)$/);
        var eMatch = eStr.match(/^([A-Za-z]*)(.*)$/);
        var prefix = sMatch[1] || "";
        var sNumStr = sMatch[2] || "0";
        var eNumStr = eMatch[2] || "0";
        var sVal = parseInt(sNumStr, 10);
        var eVal = parseInt(eNumStr, 10);
        var padLen = sNumStr.length; 
        var codes = []; 
        for (var i = sVal; i <= eVal; i++) { 
            codes.push(prefix + i.toString().padStart(padLen, '0')); 
        } 
        return codes; 
    }

    function calcTotal(id, target) { 
        document.getElementById(target).innerText = "總張數: " + document.getElementById(id).value.trim().split('\n').filter(Boolean).length; 
    }
    
    function calcTotalRange(p) { 
        var s = document.getElementById(p + 'Start').value.trim();
        var e = document.getElementById(p + 'End').value.trim(); 
        if(!s || !e) { document.getElementById(p + 'Total').innerText = "總張數: 0"; return; }
        var sMatch = s.match(/^([A-Za-z]*)(.*)$/);
        var eMatch = e.match(/^([A-Za-z]*)(.*)$/);
        var sNum = parseInt(sMatch[2] || "0", 10);
        var eNum = parseInt(eMatch[2] || "0", 10);
        var total = (sNum && eNum && eNum >= sNum) ? (eNum - sNum + 1) : 0;
        document.getElementById(p + 'Total').innerText = "總張數: " + total; 
    }
</script>
</body>
