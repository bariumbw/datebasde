<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮券全能管理系統 V2</title>
    <style>
    :root {
        --primary-pink: #ffb7c5;
        --dark-pink: #ff85a2;
        --soft-bg: #fff5f7;
        --text-color: #5a3e44;
        --border-color: #ffcdd2;
        --primary-blue: #0071e3;
        --success-green: #28a745;
        --warning-orange: #ff9500;
        --danger-red: #ff3b30;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
    body { background-color: var(--soft-bg); padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text-color); }
    .container { width: 100%; max-width: 1300px; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(255,183,197,0.3); }
    .page { display: none; }
    .page.active { display: block; }
    .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    h2 { margin-bottom: 20px; color: var(--text-color); display: flex; justify-content: space-between; align-items: center; }
    h3 { margin: 15px 0; color: #1d1d1f; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--primary-pink); border-radius: 8px; font-size: 14px; display: block; background: #fff; }
    button { padding: 8px 16px; background: var(--dark-pink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:disabled { background: #e0e0e0; cursor: not-allowed; }
    .nav-btn { padding: 10px 15px; background: #fff0f3; color: var(--text-color); border: 1px solid var(--primary-pink); border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 5px; margin-bottom: 5px; }
    .nav-btn.active { background: var(--dark-pink); color: white; border-color: var(--dark-pink); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
    th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; font-size: 12px; word-wrap: break-word; vertical-align: middle; }
    th { background: #fff0f3; }
    td input { width: 100%; padding: 4px; border: none; background: transparent; text-align: center; }
    .act-row-btn { background: var(--primary-blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .edit-btn { background: var(--warning-orange); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .save-btn { background: var(--success-green); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .del-btn { background: var(--danger-red); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; color: var(--dark-pink); font-weight: bold; }
    #toast { position: fixed; top: 20px; right: 20px; background: var(--dark-pink); color: white; padding: 15px; border-radius: 8px; display: none; z-index: 10000; }
    #previewBox { background: #f0f7ff; padding: 15px; border-radius: 10px; display: none; margin-top: 15px; border: 1px solid #cce5ff; }
    .status-badge { padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    .status-unact { background: #fff3cd; color: #856404; }
    .status-act { background: #d4edda; color: #155724; }
    .type-reg { color: #0071e3; font-weight: bold; }
    .type-use { color: #28a745; font-weight: bold; }
    
    /* 統計儀表板樣式 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #fff; border: 1px solid var(--primary-pink); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-card h4 { margin-bottom: 10px; color: var(--dark-pink); border-bottom: 1px solid var(--soft-bg); padding-bottom: 5px; }
    .stat-val { font-size: 20px; font-weight: bold; color: var(--text-color); }
    .stat-label { font-size: 12px; color: #86868b; }
    </style>
</head>
<body>

<div id="loadingOverlay">處理中...</div>
<div id="toast">存檔成功！</div>

<div class="container">
    <div id="loginPage" class="page active">
        <h2>禮券全能管理系統 V2</h2>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
        <div class="form-group"><label>密碼</label><input type="password" id="loginCode"></div>
        <button onclick="handleLogin()" style="width:100%;">登入系統</button>
    </div>

    <div id="appPage" class="page">
        <h2>禮券管理系統 <span id="userDisplay" style="font-size:14px; color:#86868b;"></span></h2>
        
        <nav style="margin-bottom:20px; display:flex; gap:10px; flex-wrap: wrap;">
            <button id="nav-statsPage" class="nav-btn active" onclick="switchPage('statsPage')">統計儀表板</button>
            <button id="nav-regPage" class="nav-btn" onclick="switchPage('regPage')">登記新券 (入庫)</button>
            <button id="nav-actPage" class="nav-btn" onclick="switchPage('actPage')">禮券啟用</button>
            <button id="nav-usePage" class="nav-btn" onclick="switchPage('usePage')">禮券使用 (出庫)</button>
            <button id="nav-recordsPage" class="nav-btn" onclick="switchPage('recordsPage')">流水帳記錄管理</button>
        </nav>

        <!-- 統計儀表板 -->
        <div id="statsPage" class="page active">
            <h2>庫存與使用量統計 <button onclick="loadStats()" style="font-size:12px;">刷新數據</button></h2>
            <div id="statsContainer" class="stats-grid">
                <!-- 統計卡片將動態插入在此 -->
            </div>
        </div>

        <!-- 登記新券 (入庫) -->
        <div id="regPage" class="page">
            <h2>登記入庫 (Batch: <span id="batchDisplay">...</span>)</h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group">
                        <label>輸入模式</label>
                        <select id="regMode" onchange="toggleRegMode(this.value)">
                            <option value="list">清單輸入</option>
                            <option value="range" selected>範圍輸入</option>
                        </select>
                    </div>
                    <div id="regList" style="display:none;" class="form-group">
                        <label>Code 清單</label>
                        <textarea id="regCodes" oninput="calcTotal('regCodes', 'regTotal')"></textarea>
                    </div>
                    <div id="regRange">
                        <div class="form-group"><label>首碼 (起始)</label><input type="text" id="regStart" oninput="calcTotalRange('reg')"></div>
                        <div class="form-group"><label>尾碼 (結束)</label><input type="text" id="regEnd" oninput="calcTotalRange('reg')"></div>
                    </div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="supplierSelect" onchange="updateGiftMenu()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="giftSelect"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <h3 id="regTotal">總張數: 0</h3>
            <button id="regBtn" onclick="register()" style="width:100%; padding: 12px;">確認登記入庫</button>
        </div>

        <!-- 禮券啟用 -->
        <div id="actPage" class="page">
            <h2>禮券啟用管理</h2>
            <div class="form-group">
                <label>輸入模式</label>
                <select id="actMode" onchange="toggleActMode(this.value)">
                    <option value="list">清單輸入</option>
                    <option value="range" selected>範圍輸入</option>
                </select>
            </div>
            <div id="actList" style="display:none;" class="form-group">
                <label>Code 清單</label>
                <textarea id="actCodes" oninput="calcTotal('actCodes', 'actTotal')"></textarea>
            </div>
            <div id="actRange">
                <div class="form-group"><label>起始</label><input type="text" id="actStart" oninput="calcTotalRange('act')"></div>
                <div class="form-group"><label>結束</label><input type="text" id="actEnd" oninput="calcTotalRange('act')"></div>
            </div>
            <h3 id="actTotal">總張數: 0</h3>
            <button id="actBtn" onclick="activateGift()" style="width:100%; padding: 12px; background: var(--primary-blue);">確認啟用</button>
        </div>

        <!-- 禮券使用 (出庫) -->
        <div id="usePage" class="page">
            <h2>禮券使用 (快速登記出庫)</h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group"><label>首碼</label><input type="text" id="useStart" oninput="useAutoDetect()" onkeypress="if(event.keyCode==13){document.getElementById('useEnd').focus();return false;}"></div>
                    <div class="form-group"><label>尾碼</label><input type="text" id="useEnd" oninput="usePreviewData()"></div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="useSupplierSelect" onchange="useUpdateGiftSelect()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="useGiftSelect" onchange="usePreviewData()"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <button onclick="usePreviewData()" style="width:100%; background:#6c757d; margin-bottom:15px;">計算並預覽</button>
            
            <div id="previewBox">
                <p><strong>預覽資訊</strong></p>
                <p>供應商: <span id="pSup"></span> | 項目: <span id="pGift"></span></p>
                <p>範圍: <span id="pStart"></span> ~ <span id="pEnd"></span></p>
                <p>有效日期: <span id="pExpiry"></span></p>
                <p>系統計算數量: <strong id="pCount" style="color:red; font-size:18px;"></strong></p>
                <div class="form-group" style="margin-top:15px;"><label>填寫訂單號 (必填)</label><input type="text" id="useOrderNo" required></div>
                <button id="finalUseBtn" onclick="useConfirmSubmit()" style="background:var(--success-green); width:100%; color:white; padding:10px; border:none; border-radius:5px;">確認使用 (正式出庫)</button>
            </div>
        </div>

        <!-- 流水帳記錄管理 -->
        <div id="recordsPage" class="page">
            <h2>流水帳記錄管理 <button onclick="loadRecords()" style="font-size:12px;">重新整理</button></h2>
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px; display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
                <input type="text" id="filterUser" placeholder="篩選人員" oninput="loadRecords()">
                <input type="text" id="filterOrder" placeholder="篩選訂單號" oninput="loadRecords()">
                <input type="date" id="filterDate" onchange="loadRecords()">
                <input type="text" id="filterItem" placeholder="篩選項目" oninput="loadRecords()">
            </div>
            <table id="recordsTable">
                <thead><tr>
                    <th style="width:12%">時間</th>
                    <th style="width:8%">類型</th>
                    <th style="width:10%">供應商</th>
                    <th style="width:10%">項目</th>
                    <th style="width:12%">首碼</th>
                    <th style="width:12%">尾碼</th>
                    <th style="width:6%">數量</th>
                    <th style="width:8%">人員</th>
                    <th style="width:10%">訂單號</th>
                    <th style="width:10%">啟用狀態</th>
                    <th style="width:10%">操作</th>
                </tr></thead>
                <tbody id="recordsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 統一 API URL (部署後填入)
    const API_URL = "您的_GAS_部署網址";
    
    let giftDatabase = [], currentUser = "", currentBatch = "", sortDesc = true;

    function showToast() { const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    async function handleLogin() {
        if (API_URL === "您的_GAS_部署網址") { alert("請先在程式碼中填入您的 GAS 部署網址！"); return; }
        showLoading();
        const email = document.getElementById('loginEmail').value;
        const code = document.getElementById('loginCode').value;
        try {
            const res = await fetch(`${API_URL}?action=verify&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.success) {
                currentUser = data.name;
                document.getElementById('userDisplay').innerText = `| 使用者: ${currentUser}`;
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('appPage').classList.add('active');
                
                await refreshConfig();
                await loadStats();
                hideLoading();
            } else { alert('驗證失敗'); hideLoading(); }
        } catch (e) { alert('系統錯誤'); hideLoading(); }
    }

    async function refreshConfig() {
        const configRes = await fetch(`${API_URL}?action=getConfig`);
        giftDatabase = await configRes.json();
        const batchRes = await fetch(`${API_URL}?action=getBatch`);
        currentBatch = (await batchRes.json()).batch;
        document.getElementById('batchDisplay').innerText = currentBatch;
        initDropdowns();
    }

    function initDropdowns() {
        const sSelect = document.getElementById('supplierSelect');
        sSelect.innerHTML = '<option value="">請選擇</option>';
        const suppliers = [...new Set(giftDatabase.map(i => i.supplier))];
        suppliers.forEach(s => {
            var opt = document.createElement('option'); opt.value = s; opt.text = s;
            sSelect.appendChild(opt);
        });
        document.getElementById('useSupplierSelect').innerHTML = '<option value="">請選擇</option>' + suppliers.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function switchPage(p) {
        document.querySelectorAll('#appPage .page').forEach(e => e.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'recordsPage') loadRecords();
        if(p === 'statsPage') loadStats();
    }

    // ========== 統計儀表板 ==========
    async function loadStats() {
        showLoading();
        const res = await fetch(`${API_URL}?action=getStats`);
        const stats = await res.json();
        const container = document.getElementById('statsContainer');
        container.innerHTML = "";
        
        for (const [name, data] of Object.entries(stats)) {
            const card = document.createElement('div');
            card.className = 'stat-card';
            const stock = data.total - data.used;
            card.innerHTML = `
                <h4>${name}</h4>
                <div class="stats-grid" style="grid-template-columns: 1fr 1fr; gap: 5px;">
                    <div><span class="stat-label">總入庫</span><br><span class="stat-val">${data.total}</span></div>
                    <div><span class="stat-label">總使用</span><br><span class="stat-val" style="color:var(--success-green)">${data.used}</span></div>
                    <div><span class="stat-label">剩餘庫存</span><br><span class="stat-val" style="color:var(--primary-blue)">${stock}</span></div>
                    <div><span class="stat-label">已啟用</span><br><span class="stat-val" style="color:var(--warning-orange)">${data.activated}</span></div>
                </div>
            `;
            container.appendChild(card);
        }
        hideLoading();
    }

    // ========== 登記與使用功能 (邏輯與之前相同，但增加了類型標記) ==========
    async function register() {
        var s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value;
        if(!s || !g) { alert("請選擇供應商與項目"); return; }
        showLoading();
        var codes = (document.getElementById('regMode').value === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('regStart').value.trim(), document.getElementById('regEnd').value.trim());
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'register', user: currentUser, payload: codes.map(c => ({Batch: currentBatch, Supplier: s, GiftName: g, Code: c.toString()})) }) });
        hideLoading(); showToast(); loadStats();
    }

    async function useConfirmSubmit() {
        if (!document.getElementById('useOrderNo').value) { alert('請填寫訂單號'); return; }
        showLoading();
        const codes = getRangeCodes(document.getElementById('useStart').value.trim(), document.getElementById('useEnd').value.trim());
        const match = window.currentUseMatch;
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'use', user: currentUser, payload: codes.map(c => ({Code: applySuffixLogic(c, match.calcType), OrderNo: document.getElementById('useOrderNo').value})) }) });
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'insertRecord', supplier: match.supplier, gift: match.name, start: document.getElementById('useStart').value, end: document.getElementById('useEnd').value, count: document.getElementById('pCount').innerText, user: currentUser, orderNo: document.getElementById('useOrderNo').value, expiry: document.getElementById('pExpiry').innerText }) });
        hideLoading(); showToast(); loadStats();
    }

    // ========== 記錄管理表格 (整合啟用狀態與類型) ==========
    async function loadRecords() {
        showLoading();
        const res = await fetch(`${API_URL}?action=getRecords`);
        let rawRecords = await res.json();
        let recordsWithObjects = rawRecords.map((r, index) => ({ data: r, oriIndex: index }));

        const fUser = document.getElementById('filterUser').value.toLowerCase();
        const fOrder = document.getElementById('filterOrder').value.toLowerCase();
        const fDate = document.getElementById('filterDate').value;
        const fItem = document.getElementById('filterItem').value.toLowerCase();

        recordsWithObjects = recordsWithObjects.filter(item => {
            const r = item.data;
            return r[6].toLowerCase().includes(fUser) && String(r[7]).toLowerCase().includes(fOrder) && r[2].toLowerCase().includes(fItem) && (!fDate || new Date(r[0]).toISOString().split('T')[0] === fDate);
        });

        recordsWithObjects.sort((a, b) => sortDesc ? new Date(b.data[0]) - new Date(a.data[0]) : new Date(a.data[0]) - new Date(b.data[0]));

        const body = document.getElementById('recordsBody');
        body.innerHTML = "";
        
        for (const item of recordsWithObjects) {
            const r = item.data;
            const idx = item.oriIndex;
            const isDel = r[9] === "已登記刪除";
            const type = r[10] || "使用";
            const typeClass = type === "登記" ? "type-reg" : "type-use";
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${new Date(r[0]).toLocaleString()}</td>
                <td class="${typeClass}">${type}</td>
                <td><input type="text" class="edit-in-${idx}" value="${r[1]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[2]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[3]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td><input type="text" class="edit-in-${idx}" value="${r[4]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td>${r[5]}</td>
                <td>${r[6]}</td>
                <td><input type="text" class="edit-in-${idx}" value="${r[7]}" ${isDel ? 'disabled' : 'readonly'}></td>
                <td id="act-status-${idx}">讀取中...</td>
                <td>${!isDel ? `<button class="edit-btn" onclick="toggleEdit(${idx})">Edit</button> <button class="del-btn" onclick="deleteRow(${idx})">刪除</button>` : '已刪除'}</td>
            `;
            body.appendChild(tr);
            if (!isDel) checkActivationStatus(r[3], r[4], idx);
            else document.getElementById(`act-status-${idx}`).innerText = "-";
        }
        hideLoading();
    }

    // 其餘工具函數 (calculateCount, getRangeCodes, etc.) 與之前相同
    async function checkActivationStatus(start, end, idx) {
        const res = await fetch(`${API_URL}?action=checkActivation&start=${start}&end=${end}`);
        const data = await res.json();
        const container = document.getElementById(`act-status-${idx}`);
        if (data.hasUnactivated) container.innerHTML = `<span class="status-badge status-unact">未全啟</span><br><button class="act-row-btn" onclick="activateRange('${start}', '${end}', ${idx})">啟用</button>`;
        else container.innerHTML = `<span class="status-badge status-act">已全啟</span>`;
    }

    async function activateRange(start, end, idx) {
        if (!confirm(`確定要啟用範圍 ${start} ~ ${end} 嗎？`)) return;
        showLoading();
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'activateRange', start: start, end: end }) });
        hideLoading(); showToast(); checkActivationStatus(start, end, idx); loadStats();
    }

    function toggleRegMode(m) { document.getElementById('regList').style.display = (m === 'list') ? 'block' : 'none'; document.getElementById('regRange').style.display = (m === 'range') ? 'block' : 'none'; }
    function toggleActMode(m) { document.getElementById('actList').style.display = (m === 'list') ? 'block' : 'none'; document.getElementById('actRange').style.display = (m === 'range') ? 'block' : 'none'; }
    function updateGiftMenu() { var s = document.getElementById('supplierSelect').value; var g = document.getElementById('giftSelect'); g.innerHTML = '<option value="">請選擇</option>'; giftDatabase.filter(r => r.supplier === s).forEach(r => { var opt = document.createElement('option'); opt.value = r.name; opt.text = r.name; g.appendChild(opt); }); }
    function useUpdateGiftSelect() { const s = document.getElementById('useSupplierSelect').value; const filtered = giftDatabase.filter(i => i.supplier === s); document.getElementById('useGiftSelect').innerHTML = '<option value="">請選擇</option>' + filtered.map(g => `<option value="${g.name}">${g.name}</option>`).join(''); usePreviewData(); }
    function useAutoDetect() { const s = document.getElementById('useStart').value.trim(); if (!s) return; const match = giftDatabase.find(item => { if (!item.rule2 || item.rule2 === 'N/A') return false; const parts = item.rule2.split(':'); if (parts[0] === 'POS') return s.substring(parseInt(parts[1]), parseInt(parts[1]) + parts[2].length) === parts[2]; if (parts[0] === 'START') return s.startsWith(parts[1]); return false; }); if (match) { document.getElementById('useSupplierSelect').value = match.supplier; useUpdateGiftSelect(); document.getElementById('useGiftSelect').value = match.name; usePreviewData(); } }
    function usePreviewData() { const match = giftDatabase.find(i => i.name === document.getElementById('useGiftSelect').value); if (match && document.getElementById('useStart').value && document.getElementById('useEnd').value) { document.getElementById('pSup').innerText = match.supplier; document.getElementById('pGift').innerText = match.name; document.getElementById('pStart').innerText = document.getElementById('useStart').value; document.getElementById('pEnd').innerText = document.getElementById('useEnd').value; document.getElementById('pExpiry').innerText = calculateExpiryDate(match.rule1); document.getElementById('pCount').innerText = calculateCount(document.getElementById('useStart').value, document.getElementById('useEnd').value, match.calcType); document.getElementById('previewBox').style.display = 'block'; window.currentUseMatch = match; } }
    function calculateExpiryDate(rule) { if (!rule || rule === 'N/A') return 'N/A'; if (rule.includes('m_end')) { const months = parseInt(rule); const date = new Date(); date.setMonth(date.getMonth() + months + 1); date.setDate(0); return date.toISOString().split('T')[0]; } return rule; }
    function calculateCount(start, end, type) { let a = start.replace(/[^0-9]/g, ''); let b = end.replace(/[^0-9]/g, ''); let valA, valB; if (type === 'suffix_1') { valA = parseInt(a.slice(0, -1), 10); valB = parseInt(b.slice(0, -1), 10); } else if (type === 'suffix_2') { valA = parseInt(a.slice(0, -2), 10); valB = parseInt(b.slice(0, -2), 10); } else if (type === 'suffix_12') { valA = parseInt(a.slice(-12), 10); valB = parseInt(b.slice(-12), 10); } else { valA = parseInt(a, 10); valB = parseInt(b, 10); } return Math.abs(valB - valA) + 1; }
    function applySuffixLogic(val, type) { var s = val.toString().trim(); var match = s.match(/^([A-Za-z]*)(.*)$/); var prefix = match[1] || ""; var numPart = match[2] || ""; if (type === "suffix_12") numPart = numPart.slice(-12); else if (type === "suffix_1") numPart = numPart.slice(0, -1); else if (type === "suffix_2") numPart = numPart.slice(0, -2); return prefix + numPart; }
    function getRangeCodes(start, end) { var sStr = start.toString().trim(); var eStr = end.toString().trim(); if(!sStr || !eStr) return []; var sMatch = sStr.match(/^([A-Za-z]*)(.*)$/); var eMatch = eStr.match(/^([A-Za-z]*)(.*)$/); var prefix = sMatch[1] || ""; var sNumStr = sMatch[2] || "0"; var eNumStr = eMatch[2] || "0"; var sVal = parseInt(sNumStr, 10); var eVal = parseInt(eNumStr, 10); var padLen = sNumStr.length; var codes = []; for (var i = sVal; i <= eVal; i++) { codes.push(prefix + i.toString().padStart(padLen, '0')); } return codes; }
    function calcTotal(id, target) { document.getElementById(target).innerText = "總張數: " + document.getElementById(id).value.trim().split('\n').filter(Boolean).length; }
    function calcTotalRange(p) { var s = document.getElementById(p + 'Start').value.trim(); var e = document.getElementById(p + 'End').value.trim(); if(!s || !e) { document.getElementById(p + 'Total').innerText = "總張數: 0"; return; } var sMatch = s.match(/^([A-Za-z]*)(.*)$/); var eMatch = e.match(/^([A-Za-z]*)(.*)$/); var sNum = parseInt(sMatch[2] || "0", 10); var eNum = parseInt(eMatch[2] || "0", 10); var total = (sNum && eNum && eNum >= sNum) ? (eNum - sNum + 1) : 0; document.getElementById(p + 'Total').innerText = "總張數: " + total; }
</script>
