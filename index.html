<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>禮券系統驗證</title>
    <!-- 請確保保留您原本的 CSS 區塊 -->
</head>
<body>
    <!-- 請保留您原本的 HTML 結構 -->

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUlzfdZa213r9npr4i8Ogvp6gQmzmpubXtJDNq72k2RPav_rF1Zt7eJyh6tJfNz5DM/exec";
        
        // 確保所有變數結構完全保留
        let configData, currentBatch, allLogs = [];
        let currentUser = "";

        // 完整保留顯示與隱藏遮罩功能
        function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
        function showToast() { const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

        // 完整保留登入功能
        async function handleLogin() {
            showLoading();
            const email = document.getElementById('loginEmail').value;
            const code = document.getElementById('loginCode').value;
            try {
                const res = await fetch(`${API_URL}?action=verify&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
                const data = await res.json();
                if (data.success) {
                    currentUser = data.name;
                    document.getElementById('loginPage').classList.remove('active');
                    document.getElementById('appPage').classList.add('active');
                    var configRes = await (await fetch(API_URL)).json();
                    configData = configRes.config;
                    await refreshBatchDisplay();
                    updateGiftMenu();
                    loadLogs();
                    initAutoTab();
                    hideLoading();
                } else { alert('驗證失敗'); hideLoading(); }
            } catch (err) { alert('登入通訊錯誤'); hideLoading(); }
        }

        // 完整保留登記功能與所有原始參數
        async function register(confirmed) { 
            var btn = document.getElementById('regBtn');
            btn.disabled = true; showLoading();
            try {
                var s = document.getElementById('supplierSelect').value;
                var g = document.getElementById('giftSelect').value;
                var mode = document.getElementById('regMode').value;
                var codes = (mode === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('regStart').value.trim(), document.getElementById('regEnd').value.trim());
                
                var payload = codes.map(function(c) {
                    return { Batch: currentBatch, Supplier: s, GiftName: g, Code: c.toString() };
                });

                var res = await (await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ mode: 'register', confirm: confirmed, payload: payload }) 
                })).json();

                if (res.result === "confirm") {
                    if (confirm(res.message)) { register(true); return; }
                } else if (res.result === "success") {
                    alert("登記完成！"); showToast(); loadLogs();
                } else {
                    alert("錯誤: " + res.message);
                }
            } catch(e) { console.error(e); } finally { btn.disabled = false; hideLoading(); }
        }

        // 完整保留使用功能與邏輯
        async function useGift(confirmed) { 
            var btn = document.getElementById('useBtn');
            showLoading();
            try {
                var mode = document.getElementById('useMode').value;
                var codes = (mode === 'list') ? document.getElementById('useCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('useStart').value.trim(), document.getElementById('useEnd').value.trim());
                
                var payload = codes.map(function(c) {
                    return { 
                        Code: applySuffixLogic(c, window.foundData.calcType), 
                        OrderNo: document.getElementById('orderNo').value 
                    };
                });

                var res = await (await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ mode: 'use', confirm: confirmed, Supplier: window.foundData.supplier, GiftName: window.foundData.gift, payload: payload }) 
                })).json();

                if (res.result === "confirm") {
                    if (confirm(res.message)) { useGift(true); return; }
                } else {
                    alert("處理完成！"); showToast(); loadLogs();
                }
            } catch(e) { console.error(e); } finally { hideLoading(); }
        }

        // 完整保留啟用功能
        async function executeActivation(codesList) {
            showLoading();
            try {
                var res = await (await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ mode: 'activate', payload: codesList }) 
                })).json();
                if(res.result === "success") { alert("啟用成功！"); showToast(); loadLogs(); }
            } catch(e) { console.error(e); } finally { hideLoading(); }
        }

        // --- 其餘您原本的所有函數 (請將您原本檔案中剩餘的函數補齊於此) ---
        function initAutoTab() { /* 原本邏輯 */ }
        function getRangeCodes(start, end) { /* 原本邏輯 */ }
        function applySuffixLogic(val, type) { /* 原本邏輯 */ }
        function loadLogs() { /* 原本邏輯 */ }
        // ...以此類推，補齊所有您原本的 function...
    </script>
</body>
</html>
