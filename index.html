<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .hidden { display: none; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div>
        <h2>登入系統</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">登入</button>
    </div>
</div>

<div id="app" class="hidden">
    <h1>禮券管理系統</h1>
    
    <div class="card">
        <h3>禮券登記</h3>
        <select id="config-select"></select>
        <input type="text" id="batch-input" placeholder="例如: V001-V100">
        <button onclick="register()">登記</button>
    </div>

    <div class="card">
        <h3>掃描核銷</h3>
        <input type="text" id="barcode" placeholder="請掃描..." autofocus>
    </div>

    <div id="stats-area"></div>
    <div id="logs-area"></div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6s_VTMx5fDPAwHombE-WgPz-MA6UC6Kwsmu-rcpQ1AJvYyEqssbx2uXkHy6YbhbSW/exec';

    // 1. 登入系統
    function login() {
        const email = document.getElementById('email').value;
        // 實作驗證後存入 sessionStorage
        sessionStorage.setItem('user', JSON.stringify({ email: email }));
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadData();
    }

    // 2. 禮券登記 (批次處理)
    function register() {
        const input = document.getElementById('batch-input').value;
        const codes = input.includes('-') ? expandRange(input) : [input];
        
        fetch(GAS_URL + '?action=register', {
            method: 'POST',
            body: JSON.stringify({ codes: codes })
        }).then(() => alert('登記完成'));
    }

    function expandRange(str) {
        let [start, end] = str.split('-');
        let prefix = start.match(/[a-zA-Z]+/)[0];
        let startNum = parseInt(start.replace(prefix, ''));
        let endNum = parseInt(end.replace(prefix, ''));
        let arr = [];
        for (let i = startNum; i <= endNum; i++) {
            arr.push(prefix + i.toString().padStart(3, '0'));
        }
        return arr;
    }

    // 4. 掃描槍 Enter 鍵觸發
    document.getElementById('barcode').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const code = this.value;
            fetch(GAS_URL + '?action=use&code=' + code)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') alert('核銷成功');
                    this.value = '';
                });
        }
    });

    // 5 & 6. 資料處理
    function loadData() {
        fetch(GAS_URL).then(res => res.json()).then(allLogs => {
            // 使用 reduce 彙總
            const stats = allLogs.reduce((acc, cur) => {
                acc[cur.GiftName] = (acc[cur.GiftName] || 0) + 1;
                return acc;
            }, {});
            
            // 使用 filter 與 sort 排序渲染
            const filtered = allLogs.filter(l => l.Status === 'active').sort((a, b) => b.Time - a.Time);
            console.log(stats, filtered);
        });
    }
</script>
</body>
</html>
