<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮券系統驗證</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f5f5f7; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }
        .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h2 { margin-bottom: 20px; color: #1d1d1f; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; display: block; }
        textarea { height: 100px; resize: vertical; }
        button { padding: 8px 16px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .nav-btn { padding: 10px 15px; background: #e7e7e7; color: #1d1d1f; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nav-btn.active { background: #0071e3; color: white; border-color: #0071e3; }
        .sub-tab-btn { padding: 8px 15px; cursor: pointer; background: #e7e7e7; border: 1px solid #ccc; margin-right: 5px; border-radius: 6px; }
        .sub-tab-btn.active { background: #008CBA; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 12px; word-wrap: break-word; white-space: pre-wrap; vertical-align: middle; }
        th { background: #f5f5f7; }
        td input { width: 100%; padding: 4px; border: none; background: transparent; text-align: center; }
        td input:disabled { color: #555; background: #eee; cursor: not-allowed; }
        .edit-btn { background: #ff9500; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .save-btn { background: #28a745; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .del-btn { background: #ff3b30; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .act-row-btn { background: #007bc2; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .log-section { display: none; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }
        .log-section.active { display: block; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .loading-box { background: #fff; padding: 20px 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-weight: bold; font-size: 16px; color: #333; }
        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 12px 30px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: 600; font-size: 14px; transition: bottom 0.4s ease, opacity 0.4s ease; opacity: 0; z-index: 10000; }
        .toast.show { bottom: 30px; opacity: 1; }
        .user-info { font-size: 14px; color: #555; font-weight: normal; margin-left: 10px; }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="loading-box">連線處理中，請稍候...</div></div>
<div id="toast" class="toast">系統更新成功！</div>

<div class="container">
    <!-- 登入頁面 -->
    <div id="loginPage" class="page active">
        <h2>禮券系統驗證</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="text" id="loginEmail" placeholder="請輸入 Email">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="loginCode" placeholder="請輸入密碼">
        </div>
        <button id="loginBtn" onclick="handleLogin()">登入系統</button>
    </div>

    <!-- 主操作頁面 -->
    <div id="mainPage" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #e2e2e7; padding-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <button id="navReg" class="nav-btn active" onclick="switchPage('reg')">禮券登記</button>
                <button id="navAct" class="nav-btn" onclick="switchPage('act')">整批啟動</button>
                <button id="navUse" class="nav-btn" onclick="switchPage('use')">使用登記</button>
                <button id="navLog" class="nav-btn" onclick="switchPage('log')">流水帳記錄</button>
            </div>
            <div>
                <span id="displayUser" class="user-info"></span>
                <button onclick="handleLogout()" style="background:#8e8e93; margin-left:10px; padding:5px 10px; font-size:12px;">登出</button>
            </div>
        </div>

        <!-- 1. 禮券登記 -->
        <div id="regSec" class="log-section active">
            <h2>禮券登記 <span id="batchDisplay" style="font-size:14px; color:#555;">(當前批次: 載入中...)</span></h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group">
                        <label>供應商</label>
                        <select id="supplierSelect" onchange="updateGiftSelect('reg')"></select>
                    </div>
                    <div class="form-group">
                        <label>禮券項目</label>
                        <select id="giftSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>輸入模式</label>
                        <select id="regMode" onchange="toggleRegMode()">
                            <option value="range">連續範圍產生</option>
                            <option value="list">獨立條碼清單</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div id="modeRange">
                        <div class="form-group">
                            <label>起始條碼 (16位)</label>
                            <input type="text" id="regStart" maxlength="16" placeholder="請輸入或刷入起始條碼" oninput="calcTotal()">
                        </div>
                        <div class="form-group">
                            <label>結束條碼 (16位)</label>
                            <input type="text" id="regEnd" maxlength="16" placeholder="請輸入或刷入結束條碼" oninput="calcTotal()">
                        </div>
                    </div>
                    <div id="modeList" style="display:none;">
                        <div class="form-group">
                            <label>條碼清單 (每行一個)</label>
                            <textarea id="regCodes" placeholder="請逐行輸入或刷入條碼" oninput="calcTotal()"></textarea>
                        </div>
                    </div>
                    <div style="margin-bottom:15px; font-weight:bold; color:#0071e3;" id="regTotal">總張數: 0</div>
                    <button id="regBtn" onclick="register(false)">確認登記</button>
                </div>
            </div>
        </div>

        <!-- 2. 整批啟動 -->
        <div id="actSec" class="log-section">
            <h2>整批啟動</h2>
            <div class="form-group">
                <label>請刷入或輸入需要啟動的條碼 (每行一個)</label>
                <textarea id="actCodes" style="height:200px;" placeholder="請逐行輸入或刷入條碼..."></textarea>
            </div>
            <button onclick="activateCodes()">執行整批啟動</button>
        </div>

        <!-- 3. 使用登記 -->
        <div id="useSec" class="log-section">
            <h2>使用登記</h2>
            <div class="reg-grid">
                <div>
                    <div class="form-group">
                        <label>單號 1</label>
                        <input type="text" id="useOrder" placeholder="請輸入銷售/出貨單號 1">
                    </div>
                    <div class="form-group">
                        <label>單號 2 (選填)</label>
                        <input type="text" id="useOrder2" placeholder="請輸入備用單號 2">
                    </div>
                    <div class="form-group">
                        <label>條碼輸入模式</label>
                        <select id="useMode" onchange="toggleUseMode()">
                            <option value="range">連續範圍登記</option>
                            <option value="list">獨立條碼清單</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div id="useModeRange">
                        <div class="form-group">
                            <label>起始條碼</label>
                            <input type="text" id="useStart" placeholder="請輸入或刷入起始條碼">
                        </div>
                        <div class="form-group">
                            <label>結束條碼</label>
                            <input type="text" id="useEnd" placeholder="請輸入或刷入結束條碼">
                        </div>
                    </div>
                    <div id="useModeList" style="display:none;">
                        <div class="form-group">
                            <label>條碼清單 (每行一個)</label>
                            <textarea id="useCodes" placeholder="請逐行輸入或刷入條碼"></textarea>
                        </div>
                    </div>
                    <button onclick="preCheckUse()">送出使用登記</button>
                </div>
            </div>
        </div>

        <!-- 4. 流水帳記錄 -->
        <div id="logSec" class="log-section">
            <h2>流水帳記錄</h2>
            <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center; background:#f5f5f7; padding:10px; border-radius:8px;">
                <div>
                    <label style="margin:0; font-size:12px;">篩選項目分頁</label>
                    <select id="filterSheet" onchange="renderLogs()" style="padding:5px; font-size:12px; width:180px;"></select>
                </div>
                <div>
                    <label style="margin:0; font-size:12px;">人員搜尋</label>
                    <input type="text" id="filterUser" oninput="renderLogs()" placeholder="輸入人員名稱" style="padding:5px; font-size:12px; width:120px;">
                </div>
                <div style="margin-top:18px;">
                    <button onclick="loadLogs()" style="padding:5px 10px; font-size:12px; background:#28a745;">重新整理資料</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th style="width:50px;">批次</th>
                            <th style="width:80px;">供應商</th>
                            <th style="width:100px;">禮券項目</th>
                            <th style="width:120px;">登記時間</th>
                            <th style="width:130px;">禮券代碼</th>
                            <th style="width:60px;">啟動</th>
                            <th style="width:60px;">使用</th>
                            <th style="width:100px;">單號1</th>
                            <th style="width:100px;">單號2</th>
                            <th style="width:70px;">人員</th>
                            <th style="width:120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyi81vVw9TqZfB66YQ7eNqG3x5CcoT_W2p0M8e0pW4N9T40K_f86vM4kR0I3I3C9uY/exec";

let configData = [];
let allLogs = [];
let currentBatch = 1;
let currentUser = "";

function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
function showToast() { var t = document.getElementById('toast'); t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 3000); }

window.onload = function() {
    setupAutotab('regStart', 'regEnd');
    setupAutotab('useStart', 'useEnd');
};

function setupAutotab(id1, id2) {
    var e1 = document.getElementById(id1), e2 = document.getElementById(id2);
    if(!e1 || !e2) return;
    e1.addEventListener('input', function() { if(this.value.length >= 16) { e2.focus(); e2.select(); } });
}

async function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var code = document.getElementById('loginCode').value.trim();
    if (!email || !code) { alert("請填寫 Email 與密碼"); return; }
    
    var btn = document.getElementById('loginBtn');
    btn.innerText = "驗證中...";
    btn.disabled = true;
    showLoading();
    
    try {
        var res = await (await fetch(`${API_URL}?action=verify&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`)).json();
        if (res.success) {
            currentUser = res.name;
            document.getElementById('displayUser').innerText = "登入者: " + currentUser;
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('mainPage').classList.add('active');
            await initSystem();
        } else {
            alert("驗證失敗，請檢查 Email 或密碼是否正確");
            btn.innerText = "登入系統";
            btn.disabled = false;
        }
    } catch(err) {
        alert("連線發送錯誤: " + err);
        btn.innerText = "登入系統";
        btn.disabled = false;
    } finally {
        hideLoading();
    }
}

function handleLogout() {
    currentUser = "";
    document.getElementById('loginEmail').value = "";
    document.getElementById('loginCode').value = "";
    document.getElementById('loginBtn').innerText = "登入系統";
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('mainPage').classList.remove('active');
    document.getElementById('loginPage').classList.add('active');
}

async function initSystem() {
    showLoading();
    try {
        var res = await (await fetch(API_URL)).json();
        configData = res.config;
        populateSupplierSelects();
        await refreshBatchDisplay();
        await loadLogs();
    } catch(e) { alert("系統初始化載入失敗"); }
    hideLoading();
}

async function refreshBatchDisplay() {
    try {
        var b = await (await fetch(`${API_URL}?action=getBatch`)).text();
        currentBatch = parseInt(b) || 1;
        document.getElementById('batchDisplay').innerText = "(當前批次: " + currentBatch + ")";
    } catch(e) { console.log("取得批次失敗"); }
}

function populateSupplierSelects() {
    var sSelect = document.getElementById('supplierSelect');
    sSelect.innerHTML = '<option value="">--請選擇--</option>';
    var sups = [];
    configData.forEach(function(r) { if(sups.indexOf(r[0]) === -1) sups.push(r[0]); });
    sups.forEach(function(s) { sSelect.innerHTML += `<option value="${s}">${s}</option>`; });
}

function updateGiftSelect(type) {
    var s = document.getElementById('supplierSelect').value;
    var gSelect = document.getElementById('giftSelect');
    gSelect.innerHTML = '<option value="">--請選擇--</option>';
    if(!s) return;
    configData.forEach(function(r) {
        if(r[0] === s) { gSelect.innerHTML += `<option value="${r[1]}">${r[1]}</option>`; }
    });
}

function toggleRegMode() {
    var m = document.getElementById('regMode').value;
    document.getElementById('modeRange').style.display = (m === 'range') ? 'block' : 'none';
    document.getElementById('modeList').style.display = (m === 'list') ? 'block' : 'none';
    calcTotal();
}
function toggleUseMode() {
    var m = document.getElementById('useMode').value;
    document.getElementById('useModeRange').style.display = (m === 'range') ? 'block' : 'none';
    document.getElementById('useModeList').style.display = (m === 'list') ? 'block' : 'none';
}

function calcTotal() {
    var m = document.getElementById('regMode').value;
    var total = 0;
    if (m === 'range') {
        var start = document.getElementById('regStart').value.trim();
        var end = document.getElementById('regEnd').value.trim();
        if(start && end && start.length === end.length) {
            var diff = BigInt(end) - BigInt(start);
            total = diff >= 0N ? Number(diff) + 1 : 0;
        }
    } else {
        var val = document.getElementById('regCodes').value.trim();
        total = val ? val.split('\n').filter(function(x){return x.trim() !== "";}).length : 0;
    }
    document.getElementById('regTotal').innerText = "總張數: " + total;
}

function getRangeCodes(startStr, endStr) {
    var codes = [];
    var startNum = BigInt(startStr);
    var endNum = BigInt(endStr);
    var len = startStr.length;
    for (var n = startNum; n <= endNum; n++) {
        var s = n.toString();
        while(s.length < len) { s = "0" + s; }
        codes.push(s);
    }
    return codes;
}

async function register(confirmed) { 
    var btn = document.getElementById('regBtn'); 
    btn.innerText = "處理中..."; 
    btn.disabled = true; 
    showLoading();
    var s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value; 
    if(!s || !g) { alert("請選擇供應商與項目"); btn.innerText = "確認登記"; btn.disabled = false; hideLoading(); return; }
    var codes = (document.getElementById('regMode').value === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('regStart').value.trim(), document.getElementById('regEnd').value.trim()); 
    
    var res = await (await fetch(API_URL, { 
        method: "POST", 
        body: JSON.stringify({
            mode: 'register', 
            confirm: confirmed,
            // 確保留水帳與 A 部門分頁同步帶入當前操作人員
            payload: codes.map(function(c){ return {Batch: currentBatch, Supplier: s, GiftName: g, Code: c.toString(), User: currentUser}; })
        }) 
    })).json(); 
    
    btn.innerText = "確認登記";
    btn.disabled = false;
    hideLoading();
    
    if (res.result === "confirm") {
        if (confirm(res.message)) { register(true); }
    } else if (res.result === "success") {
        alert("登記完成！成功新增 " + res.count + " 筆。"); 
        showToast();
        document.getElementById('regStart').value = "";
        document.getElementById('regEnd').value = "";
        document.getElementById('regCodes').value = "";
        document.getElementById('regTotal').innerText = "總張數: 0";
        await refreshBatchDisplay();
        loadLogs(); 
    } else {
        alert("錯誤: " + res.message);
    }
}

async function activateCodes() {
    var txt = document.getElementById('actCodes').value.trim();
    if(!txt) { alert("請輸入條碼"); return; }
    var codes = txt.split('\n').map(function(c){return c.trim();}).filter(function(c){return c!=="";});
    showLoading();
    var res = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'activate', payload: codes }) })).json();
    hideLoading();
    if(res.result === 'success') {
        alert("啟動程序處理完畢，共媒合成功並啟動 " + res.count + " 張禮券！");
        document.getElementById('actCodes').value = "";
        loadLogs();
    }
}

async function preCheckUse() {
    var orderNo = document.getElementById('useOrder').value.trim();
    var orderNo2 = document.getElementById('useOrder2').value.trim();
    if(!orderNo) { alert("請填寫單號 1"); return; }
    
    var codes = [];
    if(document.getElementById('useMode').value === 'range') {
        var start = document.getElementById('useStart').value.trim(), end = document.getElementById('useEnd').value.trim();
        if(!start || !end) { alert("請填寫起始與結束條碼"); return; }
        codes = getRangeCodes(start, end);
    } else {
        var txt = document.getElementById('useCodes').value.trim();
        if(!txt) { alert("請輸入條碼清單"); return; }
        codes = txt.split('\n').map(function(c){return c.trim();}).filter(function(c){return c!=="";});
    }
    
    showLoading();
    var firstCode = codes[0];
    var findRes = await (await fetch(`${API_URL}?action=find&code=${firstCode}`)).json();
    hideLoading();
    
    if(!findRes.found) {
        alert("錯誤：在資料庫中找不到起始條碼 [" + firstCode + "] 登記記錄，無法對齊供應商與項目！");
        return;
    }
    executeUse(findRes.supplier, findRes.gift, orderNo, orderNo2, codes, false);
}

async function executeUse(supplier, gift, orderNo, orderNo2, codes, confirmed) {
    showLoading();
    var res = await (await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            mode: 'use', Supplier: supplier, GiftName: gift, OrderNo: orderNo, OrderNo2: orderNo2, confirm: confirmed,
            payload: codes.map(function(c){ return {Code: c}; })
        })
    })).json();
    hideLoading();
    
    if(res.result === 'confirm') {
        if(confirm(res.message)) { executeUse(supplier, gift, orderNo, orderNo2, codes, true); }
    } else if(res.result === 'success') {
        alert("使用登記成功！");
        showToast();
        document.getElementById('useStart').value = "";
        document.getElementById('useEnd').value = "";
        document.getElementById('useCodes').value = "";
        loadLogs();
    } else {
        alert("失敗：" + res.message);
    }
}

async function loadLogs() {
    try {
        var res = await (await fetch(`${API_URL}?action=getLogs`)).json();
        allLogs = res;
        
        var fSelect = document.getElementById('filterSheet');
        var prevVal = fSelect.value;
        var sheets = [];
        allLogs.forEach(function(l){ if(sheets.indexOf(l.sheet) === -1) sheets.push(l.sheet); });
        
        fSelect.innerHTML = '<option value="">--顯示全部項目--</option>';
        sheets.forEach(function(s){ fSelect.innerHTML += `<option value="${s}">${s}</option>`; });
        if(prevVal) fSelect.value = prevVal;
        
        renderLogs();
    } catch(e) { console.log("載入流水帳失敗"); }
}

function renderLogs() {
    var fSheet = document.getElementById('filterSheet').value;
    var fU = document.getElementById('filterUser').value.trim().toLowerCase();
    var tbody = document.getElementById('logBody');
    tbody.innerHTML = "";
    
    var filtered = allLogs.filter(function(l) {
        // 精確排除 B 部門專用的 All_Register_Logs 總表分頁，不重複渲染至 A 部門前端記錄
        if (l.sheet === "All_Register_Logs") return false;
        var passSheet = !fSheet || l.sheet === fSheet;
        var passUser = !fU || (l.data[11] || "").toString().toLowerCase().includes(fU);
        return passSheet && passUser;
    });
    
    // 由新到舊排序
    filtered.sort(function(a,b) { return b.data[0] - a.data[0]; });
    
    filtered.forEach(function(l) {
        var d = l.data;
        var isDeleted = d[12] === "已登記刪除";
        var tr = document.createElement('tr');
        if(isDeleted) tr.style.textDecoration = "line-through";
        
        var tStr = d[3] ? new Date(d[3]).toLocaleString('zh-TW', {hour12:false}) : "";
        
        tr.innerHTML = `
            <td>${d[0]}</td>
            <td>${d[1]}</td>
            <td>${d[2]}</td>
            <td>${tStr}</td>
            <td>${d[4]}</td>
            <td>${d[5]}</td>
            <td><span style="color:${d[6]==='已使用'?'red':'green'}">${d[6]}</span></td>
            <td><input type="text" id="ord_${l.sheet}_${l.row}" value="${d[7]||''}" disabled></td>
            <td>${d[9]||''}</td>
            <td>${d[11]||''}</td>
            <td>
                ${isDeleted ? '<span style="color:gray;">已刪除</span>' : `
                    <button class="edit-btn" id="ebtn_${l.sheet}_${l.row}" onclick="toggleEdit('${l.sheet}', ${l.row})">改單</button>
                    <button class="del-btn" onclick="deleteRow('${l.sheet}', ${l.row})">刪</button>
                `}
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function toggleEdit(sheet, row) {
    var input = document.getElementById(`ord_${sheet}_${row}`);
    var btn = document.getElementById(`ebtn_${sheet}_${row}`);
    if(input.disabled) {
        input.disabled = false; input.focus(); btn.innerText = "儲存"; btn.className = "save-btn";
    } else {
        var newVal = input.value.trim();
        if(!newVal) { alert("單號不可為空"); return; }
        executeEdit(sheet, row, newVal);
    }
}

async function executeEdit(sheet, row, newVal) {
    showLoading();
    var res = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'edit', sheet: sheet, row: row, newOrderNo: newVal }) })).json();
    hideLoading();
    if(res.result === 'success') { alert("單號修改成功"); loadLogs(); }
}

async function deleteRow(sheet, row) {
    if(!confirm("確定要將此禮券標記為「已登記刪除」嗎？\n此動作將釋放此條碼的使用狀態。")) return;
    showLoading();
    var res = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({ mode: 'delete', sheet: sheet, row: row }) })).json();
    hideLoading();
    if(res.result === 'success') { alert("已被標記刪除"); loadLogs(); }
}

function switchPage(pageId) {
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.log-section').forEach(function(s){s.classList.remove('active');});
    if(pageId === 'reg') { document.getElementById('navReg').classList.add('active'); document.getElementById('regSec').classList.add('active'); }
    if(pageId === 'act') { document.getElementById('navAct').classList.add('active'); document.getElementById('actSec').classList.add('active'); }
    if(pageId === 'use') { document.getElementById('navUse').classList.add('active'); document.getElementById('useSec').classList.add('active'); }
    if(pageId === 'log') { document.getElementById('navLog').classList.add('active'); document.getElementById('logSec').classList.add('active'); }
}
</script>
</body>
</html>
