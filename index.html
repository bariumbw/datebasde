<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮券全能管理系統 V3.6.0 終極極速版</title>
    <style>
    :root {
        --primary-pink: #ffb7c5;
        --dark-pink: #ff85a2;
        --soft-bg: #fff5f7;
        --text-color: #5a3e44;
        --border-color: #ffcdd2;
        --primary-blue: #0071e3;
        --success-green: #28a745;
        --warning-orange: #ff9500;
        --danger-red: #ff3b30;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
    body { background-color: var(--soft-bg); padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text-color); }
    .container { width: 100%; max-width: 1350px; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(255,183,197,0.3); }
    
    .main-section { display: none; }
    .main-section.active { display: block; }
    .sub-page { display: none; }
    .sub-page.active { display: block; }

    .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    h2 { margin-bottom: 20px; color: var(--text-color); }
    h3 { margin: 15px 0; color: #1d1d1f; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--primary-pink); border-radius: 8px; font-size: 14px; background: #fff; }
    button { padding: 8px 16px; background: var(--dark-pink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { opacity: 0.9; }
    .nav-btn { padding: 10px 15px; background: #fff0f3; color: #000; border: 1px solid var(--primary-pink); border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 5px; margin-bottom: 5px; }
    .nav-btn.active { background: var(--dark-pink); color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; font-size: 12px; }
    th { background: #fff0f3; }
    .del-btn { background: var(--danger-red); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
    #previewBox { background: #f0f7ff; padding: 15px; border-radius: 10px; display: none; margin-top: 15px; border: 1px solid #cce5ff; }
    .filter-bar { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 10px; border: 1px solid var(--primary-pink); background: white; border-radius: 8px; cursor: pointer; font-weight: bold; color: #000; }
    .tab-btn.active { background: var(--dark-pink); color: white; }
    .usage-warning { color: var(--danger-red); font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="loadingOverlay">處理中，請稍候...</div>

<div class="container">
    <div id="loginPage" class="main-section active">
        <h2>禮券全能管理系統 V3.6.0 終極版</h2>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
        <div class="form-group"><label>密碼</label><input type="password" id="loginCode"></div>
        <button onclick="handleLogin()" style="width:100%;">進入極速系統</button>
    </div>

    <div id="appPage" class="main-section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>禮券管理系統</h2>
            <span id="userDisplay" style="font-weight: bold; color: var(--dark-pink);"></span>
        </div>
        
        <nav style="margin-bottom:20px; display:flex; gap:10px; flex-wrap: wrap;">
            <button class="nav-btn active" onclick="switchSubPage('statsPage')">庫存與使用量統計</button>
            <button class="nav-btn" onclick="switchSubPage('regPage')">登記新券 (入庫)</button>
            <button class="nav-btn" onclick="switchSubPage('actPage')">禮券啟用</button>
            <button class="nav-btn" onclick="switchSubPage('usePage')">禮券使用 (出庫)</button>
            <button class="nav-btn" onclick="switchSubPage('recordsPage')">流水帳記錄管理</button>
        </nav>

        <div id="statsPage" class="sub-page active">
            <div class="filter-bar">
                <div class="form-group"><label>供應商</label><select id="statSupplier" onchange="updateStatGiftMenu(); loadStats()"><option value="">全部</option></select></div>
                <div class="form-group"><label>項目</label><select id="statGift" onchange="loadStats()"><option value="">全部</option></select></div>
                <button onclick="loadStats()" style="height: 40px; margin-top: 22px;">刷新統計</button>
            </div>
            <table><thead><tr><th>項目名稱</th><th>供應商</th><th>總入庫</th><th>總使用</th><th>剩餘庫存</th><th>已啟動</th></tr></thead><tbody id="statsTableBody"></tbody></table>
        </div>

        <div id="regPage" class="sub-page">
            <h3>登記入庫 (目前批次: <span id="batchDisplay">...</span>)</h3>
            <div class="reg-grid">
                <div>
                    <div class="form-group"><label>輸入模式</label><select id="regMode" onchange="toggleRegMode(this.value)"><option value="range">範圍輸入</option><option value="list">清單輸入</option></select></div>
                    <div id="regList" style="display:none;" class="form-group"><label>Code 清單 (一行一個)</label><textarea id="regCodes" rows="5" oninput="calcTotal('regCodes', 'regTotal')"></textarea></div>
                    <div id="regRange"><div class="form-group"><label>起始代碼</label><input type="text" id="regStart" oninput="calcTotalRange('reg')"></div><div class="form-group"><label>結束代碼</label><input type="text" id="regEnd" oninput="calcTotalRange('reg')"></div></div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="supplierSelect" onchange="updateGiftMenu()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="giftSelect"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <h3 id="regTotal" style="color: var(--primary-blue);">總張數: 0</h3>
            <button onclick="register()" style="width:100%; padding: 15px; font-size: 16px;">確認登記入庫</button>
        </div>

        <div id="actPage" class="sub-page">
            <h3>禮券批次啟用</h3>
            <div class="form-group"><label>輸入模式</label><select id="actMode" onchange="toggleActMode(this.value)"><option value="range">範圍輸入</option><option value="list">清單輸入</option></select></div>
            <div id="actList" style="display:none;" class="form-group"><label>Code 清單</label><textarea id="actCodes" rows="5" oninput="calcTotal('actCodes', 'actTotal')"></textarea></div>
            <div id="actRange"><div class="form-group"><label>起始代碼</label><input type="text" id="actStart" oninput="calcTotalRange('act')"></div><div class="form-group"><label>結束代碼</label><input type="text" id="actEnd" oninput="calcTotalRange('act')"></div></div>
            <h3 id="actTotal" style="color: var(--primary-blue);">總張數: 0</h3>
            <button onclick="activateGift()" style="width:100%; padding: 15px; background: var(--primary-blue);">確認啟用禮券</button>
        </div>

        <div id="usePage" class="sub-page">
            <h3>禮券使用 (出庫)</h3>
            <div class="reg-grid">
                <div>
                    <div class="form-group"><label>輸入模式</label><select id="useMode" onchange="toggleUseMode(this.value)"><option value="range">範圍輸入</option><option value="list">清單輸入</option></select></div>
                    <div id="useRangeSection"><div class="form-group"><label>首碼 (輸入後自動偵測)</label><input type="text" id="useStart" oninput="useSmartDetect()"></div><div class="form-group"><label>尾碼</label><input type="text" id="useEnd" oninput="useAutoPreview()"></div></div>
                    <div id="useListSection" style="display:none;"><div class="form-group"><label>Code 清單</label><textarea id="useCodes" rows="5" oninput="useSmartDetectList()"></textarea></div></div>
                </div>
                <div>
                    <div class="form-group"><label>供應商</label><select id="useSupplierSelect" onchange="useUpdateGiftSelect()"><option value="">請選擇</option></select></div>
                    <div class="form-group"><label>禮券項目</label><select id="useGiftSelect" onchange="useAutoPreview()"><option value="">請選擇</option></select></div>
                </div>
            </div>
            <div id="previewBox">
                <p><strong>【即時預覽】</strong></p>
                <p>供應商: <span id="pSup"></span> | 項目: <span id="pGift"></span></p>
                <p>狀態檢查: <span id="pUsageStatus"></span></p>
                <p>計算張數: <strong id="pCount" style="color:red; font-size:20px;"></strong></p>
                <div id="usageWarning" class="usage-warning">⚠️ 注意：範圍內含已使用代碼，確認後將寫入二次登記區。</div>
                <div class="form-group" style="margin-top:15px;"><label>填寫訂單號 (必填)</label><input type="text" id="useOrderNo" placeholder="請輸入訂單編號"></div>
                <button onclick="useConfirmSubmit()" style="background:var(--success-green); width:100%; padding:15px; font-size: 16px;">確認出庫 (正式紀錄)</button>
            </div>
        </div>

        <div id="recordsPage" class="sub-page">
            <div class="tab-container">
                <button class="tab-btn active" onclick="filterRecordsByType('')">全部紀錄</button>
                <button class="tab-btn" onclick="filterRecordsByType('使用')">使用紀錄</button>
                <button class="tab-btn" onclick="filterRecordsByType('登記')">登記紀錄</button>
            </div>
            <div class="filter-bar">
                <input type="text" id="filterUser" placeholder="人員搜尋" oninput="renderRecords()">
                <input type="text" id="filterOrder" placeholder="訂單號搜尋" oninput="renderRecords()">
                <button onclick="loadRecords()">重新載入</button>
            </div>
            <table id="recordsTable"><thead><tr><th>時間</th><th>類型</th><th>供應商</th><th>項目</th><th>首碼</th><th>尾碼</th><th>數量</th><th>人員</th><th>訂單號</th><th>啟動狀態</th><th>操作</th></tr></thead><tbody id="recordsTableBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzz1AHRjF9GsSbwwRYgQjMXc7ah4Jdz1G8zLbaKlsM1cCu6X1lm6i1oB_1DCUEUxZ2vmg/exec";
    let currentUser = "", configData = [], allRecords = [], currentRecordType = "", currentBatch = "";

    function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const code = document.getElementById('loginCode').value.trim();
        if (!email || !code) return alert("請填寫登入資訊");
        showLoading();
        try {
            const res = await fetch(`${API_URL}?action=verify&email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.success) {
                currentUser = data.name;
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('appPage').classList.add('active');
                document.getElementById('userDisplay').innerText = `👤 使用者: ${currentUser}`;
                initBaseData();
            } else alert("登入失敗，請檢查 Email 或密碼");
        } catch (e) { alert("連線失敗: " + e.message); }
        hideLoading();
    }

    async function initBaseData() {
        try {
            const [confRes, batchRes] = await Promise.all([
                fetch(`${API_URL}?action=getConfig`),
                fetch(`${API_URL}?action=getBatch`)
            ]);
            configData = await confRes.json();
            const batchData = await batchRes.json();
            currentBatch = batchData.batch || "N/A";
            document.getElementById('batchDisplay').innerText = currentBatch;
            
            ['supplierSelect', 'useSupplierSelect', 'statSupplier'].forEach(id => {
                const s = document.getElementById(id);
                s.innerHTML = (id === 'statSupplier') ? '<option value="">全部</option>' : '<option value="">請選擇</option>';
                [...new Set(configData.map(c => c.supplier))].forEach(sup => s.add(new Option(sup, sup)));
            });
            loadStats();
        } catch (e) { console.error("初始化失敗", e); }
    }

    function switchSubPage(pageId) {
        document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        event.target.classList.add('active');
        if (pageId === 'recordsPage') loadRecords();
    }

    // 核心邏輯恢復
    function useSmartDetect() {
        const code = document.getElementById('useStart').value.trim();
        if (code.length < 3) return;
        const matching = configData.find(c => code.startsWith(c.rule1) || code.startsWith(c.rule2));
        if (matching) {
            document.getElementById('useSupplierSelect').value = matching.supplier;
            useUpdateGiftSelect(matching.name);
        }
    }

    function useSmartDetectList() {
        const codes = document.getElementById('useCodes').value.split('\n').map(c => c.trim()).filter(c => c);
        if (codes.length > 0) {
            const matching = configData.find(c => codes[0].startsWith(c.rule1) || codes[0].startsWith(c.rule2));
            if (matching) {
                document.getElementById('useSupplierSelect').value = matching.supplier;
                useUpdateGiftSelect(matching.name);
            }
        }
    }

    function useUpdateGiftSelect(targetGift = "") {
        const sup = document.getElementById('useSupplierSelect').value;
        const giftS = document.getElementById('useGiftSelect');
        giftS.innerHTML = '<option value="">請選擇</option>';
        configData.filter(c => c.supplier === sup).forEach(c => giftS.add(new Option(c.name, c.name)));
        if (targetGift) giftS.value = targetGift;
        useAutoPreview();
    }

    async function useAutoPreview() {
        const sup = document.getElementById('useSupplierSelect').value;
        const gift = document.getElementById('useGiftSelect').value;
        if (!sup || !gift) return;

        const mode = document.getElementById('useMode').value;
        let codes = (mode === 'range') ? getRangeCodes(document.getElementById('useStart').value, document.getElementById('useEnd').value) : 
                                       document.getElementById('useCodes').value.split('\n').map(c => c.trim()).filter(c => c);
        if (codes.length === 0) return;

        document.getElementById('previewBox').style.display = 'block';
        document.getElementById('pSup').innerText = sup;
        document.getElementById('pGift').innerText = gift;
        document.getElementById('pCount').innerText = codes.length;

        try {
            const res = await fetch(`${API_URL}?action=checkUsage&codes=${JSON.stringify(codes)}`);
            const data = await res.json();
            const isUsed = data.usedCodes && data.usedCodes.length > 0;
            document.getElementById('pUsageStatus').innerText = isUsed ? "❌ 警告：部分代碼已使用過" : "✅ 狀態正常：代碼皆未使用";
            document.getElementById('pUsageStatus').style.color = isUsed ? "red" : "green";
            document.getElementById('usageWarning').style.display = isUsed ? "block" : "none";
        } catch (e) { console.error("預覽檢查失敗", e); }
    }

    async function useConfirmSubmit() {
        const orderNo = document.getElementById('useOrderNo').value.trim();
        if (!orderNo) return alert("請輸入訂單號");
        const isUsed = document.getElementById('usageWarning').style.display === 'block';
        if (isUsed && !confirm("偵測到重複代碼，確定要進行二次登記嗎？")) return;

        showLoading();
        const mode = document.getElementById('useMode').value;
        let codes = (mode === 'range') ? getRangeCodes(document.getElementById('useStart').value, document.getElementById('useEnd').value) : 
                                       document.getElementById('useCodes').value.split('\n').map(c => c.trim()).filter(c => c);
        
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ mode: 'use', user: currentUser, codes, supplier: document.getElementById('useSupplierSelect').value, gift: document.getElementById('useGiftSelect').value, orderNo }) });
            const data = await res.json();
            if (data.result === 'success') {
                alert("出庫成功！");
                ['useStart', 'useEnd', 'useCodes', 'useOrderNo'].forEach(id => document.getElementById(id).value = "");
                document.getElementById('useSupplierSelect').value = "";
                document.getElementById('useGiftSelect').value = "";
                document.getElementById('previewBox').style.display = 'none';
            } else alert("錯誤: " + data.error);
        } catch (e) { alert("連線錯誤: " + e.message); }
        hideLoading();
    }

    // 通用工具
    function getRangeCodes(start, end) {
        const sMatch = start.trim().match(/^([A-Za-z]*)(.*)$/);
        const eMatch = end.trim().match(/^([A-Za-z]*)(.*)$/);
        if (!sMatch || !eMatch) return [];
        const prefix = sMatch[1], sNum = parseInt(sMatch[2]) || 0, eNum = parseInt(eMatch[2]) || 0;
        const padLen = sMatch[2].length, codes = [];
        for (let i = sNum; i <= eNum; i++) codes.push(prefix + i.toString().padStart(padLen, '0'));
        return codes;
    }

    function calcTotal(tid, did) {
        const len = document.getElementById(tid).value.split('\n').filter(c => c.trim()).length;
        document.getElementById(did).innerText = `總張數: ${len}`;
    }

    function calcTotalRange(pre) {
        const len = getRangeCodes(document.getElementById(pre + 'Start').value, document.getElementById(pre + 'End').value).length;
        document.getElementById(pre + 'Total').innerText = `總張數: ${len}`;
    }

    function toggleRegMode(v) { document.getElementById('regList').style.display = v==='list'?'block':'none'; document.getElementById('regRange').style.display = v==='range'?'block':'none'; }
    function toggleActMode(v) { document.getElementById('actList').style.display = v==='list'?'block':'none'; document.getElementById('actRange').style.display = v==='range'?'block':'none'; }
    function toggleUseMode(v) { document.getElementById('useListSection').style.display = v==='list'?'block':'none'; document.getElementById('useRangeSection').style.display = v==='range'?'block':'none'; useAutoPreview(); }

    async function loadStats() {
        const sup = document.getElementById('statSupplier').value;
        const gift = document.getElementById('statGift').value;
        try {
            const res = await fetch(`${API_URL}?action=getStats&supplier=${sup}&gift=${gift}`);
            const data = await res.json();
            document.getElementById('statsTableBody').innerHTML = data.map(r => `<tr><td>${r.giftName}</td><td>${r.supplier}</td><td>${r.total}</td><td>${r.used}</td><td>${r.total-r.used}</td><td>${r.activated}</td></tr>`).join('');
        } catch (e) { console.error(e); }
    }

    function updateStatGiftMenu() {
        const sup = document.getElementById('statSupplier').value;
        const giftS = document.getElementById('statGift');
        giftS.innerHTML = '<option value="">全部</option>';
        configData.filter(c => !sup || c.supplier === sup).forEach(c => giftS.add(new Option(c.name, c.name)));
    }

    function updateGiftMenu() {
        const sup = document.getElementById('supplierSelect').value;
        const giftS = document.getElementById('giftSelect');
        giftS.innerHTML = '<option value="">請選擇</option>';
        configData.filter(c => c.supplier === sup).forEach(c => giftS.add(new Option(c.name, c.name)));
    }

    async function register() {
        const sup = document.getElementById('supplierSelect').value;
        const gift = document.getElementById('giftSelect').value;
        if (!sup || !gift) return alert("請選擇供應商與項目");
        const mode = document.getElementById('regMode').value;
        let codes = (mode === 'range') ? getRangeCodes(document.getElementById('regStart').value, document.getElementById('regEnd').value) : 
                                       document.getElementById('regCodes').value.split('\n').map(c => c.trim()).filter(c => c);
        if (codes.length === 0) return alert("請輸入代碼");
        showLoading();
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ mode: 'register', user: currentUser, codes, supplier: sup, gift, batch: currentBatch }) });
            const data = await res.json();
            if (data.result === 'success') {
                alert("登記成功！");
                ['regStart', 'regEnd', 'regCodes'].forEach(id => document.getElementById(id).value = "");
                document.getElementById('regTotal').innerText = "總張數: 0";
            } else alert("錯誤: " + data.error);
        } catch (e) { alert(e.message); }
        hideLoading();
    }

    async function activateGift() {
        const mode = document.getElementById('actMode').value;
        let codes = (mode === 'range') ? getRangeCodes(document.getElementById('actStart').value, document.getElementById('actEnd').value) : 
                                       document.getElementById('actCodes').value.split('\n').map(c => c.trim()).filter(c => c);
        if (codes.length === 0) return alert("請輸入代碼");
        showLoading();
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ mode: 'activate', user: currentUser, codes }) });
            const data = await res.json();
            if (data.result === 'success') {
                alert("啟用成功！");
                ['actStart', 'actEnd', 'actCodes'].forEach(id => document.getElementById(id).value = "");
                document.getElementById('actTotal').innerText = "總張數: 0";
            } else alert("錯誤: " + data.error);
        } catch (e) { alert(e.message); }
        hideLoading();
    }

    async function loadRecords() {
        showLoading();
        try {
            const res = await fetch(`${API_URL}?action=getRecords`);
            allRecords = await res.json() || [];
            renderRecords();
        } catch (e) { console.error(e); }
        hideLoading();
    }

    function renderRecords() {
        const userF = document.getElementById('filterUser').value.toLowerCase();
        const orderF = document.getElementById('filterOrder').value.toLowerCase();
        const filtered = allRecords.filter(r => {
            if (currentRecordType && r[8] !== currentRecordType) return false;
            if (userF && !r[6].toLowerCase().includes(userF)) return false;
            if (orderF && !r[7].toString().toLowerCase().includes(orderF)) return false;
            return true;
        });
        document.getElementById('recordsTableBody').innerHTML = filtered.map((r, i) => `
            <tr>
                <td>${new Date(r[0]).toLocaleString()}</td>
                <td style="color:black; font-weight:bold;">${r[8]}</td>
                <td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td>
                <td>${r[9]}</td>
                <td><button class="del-btn" onclick="deleteRecord(${allRecords.indexOf(r)})">刪除</button></td>
            </tr>
        `).join('');
    }

    function filterRecordsByType(type) {
        currentRecordType = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderRecords();
    }

    async function deleteRecord(idx) {
        if (!confirm("確定要刪除此紀錄嗎？")) return;
        showLoading();
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ mode: 'deleteRecord', user: currentUser, recordIndex: idx }) });
            const data = await res.json();
            if (data.result === 'success') { alert("刪除成功！"); loadRecords(); }
        } catch (e) { alert(e.message); }
        hideLoading();
    }
</script>
</body>
</html>
