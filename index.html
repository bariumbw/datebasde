<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統 (粉紅主題)</title>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --dark-pink: #ff85a2;
            --soft-bg: #fff5f7;
            --text-color: #5a3e44;
        }
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: var(--soft-bg); color: var(--text-color); }
        .hidden { display: none; }
        
        /* 登入遮罩層 */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ffeef2; z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
        }
        
        /* 卡片風格 */
        .card { 
            background: white; border: 1px solid #ffd6de; 
            padding: 20px; border-radius: 16px; margin-bottom: 20px; 
            box-shadow: 0 4px 12px rgba(255, 183, 197, 0.2);
        }
        
        button { 
            background-color: var(--dark-pink); color: white; border: none; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #ff6b8d; }
        
        input, select { 
            border: 1px solid var(--primary-pink); padding: 8px; 
            border-radius: 8px; margin: 5px 0;
        }
    </style>
</head>
<body>

<!-- 1. 登入系統 -->
<div id="login-overlay">
    <div class="card" style="text-align: center;">
        <h2 style="color: var(--dark-pink);">甜蜜登入</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="密碼"><br>
        <button onclick="login()">進入系統</button>
    </div>
</div>

<!-- 主功能區 -->
<div id="app" class="hidden">
    <h1>禮券管理系統</h1>
    
    <div class="card">
        <h3>禮券登記</h3>
        <select id="config-select"></select>
        <input type="text" id="batch-input" placeholder="例如: V001-V100">
        <button onclick="register()">登記</button>
    </div>

    <div class="card">
        <h3>掃描核銷</h3>
        <input type="text" id="barcode" placeholder="請掃描..." autofocus>
    </div>

    <div id="stats-area"></div>
    <div id="logs-area"></div>
</div>

<script>
    // 這裡替換成您自己的 GAS URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzz1AHRjF9GsSbwwRYgQjMXc7ah4Jdz1G8zLbaKlsM1cCu6X1lm6i1oB_1DCUEUxZ2vmg/exec';

    function login() {
        // 登入邏輯
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        loadData();
    }

    function register() {
        const input = document.getElementById('batch-input').value;
        alert("已登記批次: " + input);
        // 此處對接您的 GAS register 邏輯
    }

    function loadData() {
        // 此處對接您的 GAS 讀取與渲染邏輯
        console.log("系統已載入");
    }
</script>
</body>
</html>
